<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Holy Word</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
--sf:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
--serif:'Noto Serif','Georgia',serif;
--blue:#007AFF;--red:#FF3B30;--orange:#FF9500;--green:#34C759;
--g1:#8E8E93;--g2:#AEAEB2;--g3:#C7C7CC;--g4:#D1D1D6;--g5:#E5E5EA;--g6:#F2F2F7;
--label:#000;--label2:#3C3C43;--label3:rgba(60,60,67,0.6);
--bg:#FFF;--bg2:#F2F2F7;--card:#FFF;--elevated:#FFF;
--sep:rgba(60,60,67,0.2);--sep2:#C6C6C8;
--fill:rgba(120,120,128,0.2);--fill2:rgba(120,120,128,0.16);--fill3:rgba(118,118,128,0.12);
--nav-bg:rgba(249,249,249,0.94);--tab-bg:rgba(249,249,249,0.94);
--fs:17px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)
}
@media(prefers-color-scheme:dark){:root{
--label:#FFF;--label2:#EBEBF5;--label3:rgba(235,235,245,0.38);
--bg:#000;--bg2:#1C1C1E;--card:#1C1C1E;--elevated:#2C2C2E;
--sep:rgba(84,84,88,0.6);--sep2:#38383A;
--fill:rgba(120,120,128,0.36);--fill2:rgba(120,120,128,0.32);--fill3:rgba(118,118,128,0.24);
--nav-bg:rgba(29,29,31,0.94);--tab-bg:rgba(29,29,31,0.94);--g6:#1C1C1E
}}
body{font-family:var(--sf);background:var(--bg2);color:var(--label);min-height:100vh;overflow-x:hidden;font-size:var(--fs);line-height:1.47;letter-spacing:-0.022em}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid var(--sep);padding-top:var(--safe-t)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-book{font-family:var(--sf);font-size:17px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:6px 0}
.nav-book i{font-size:10px}
.nav-ver{font-family:var(--sf);font-size:13px;font-weight:600;color:var(--label);background:var(--fill3);border:none;border-radius:14px;padding:4px 10px;cursor:pointer}
.nav-right{display:flex;align-items:center;gap:2px}
.nav-btn{background:none;border:none;color:var(--blue);font-size:20px;cursor:pointer;padding:8px 10px;border-radius:50%}
.nav-btn:active{background:var(--fill3)}
.main{padding-top:calc(44px + var(--safe-t));padding-bottom:calc(50px + var(--safe-b));min-height:100vh}
.ch-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--sep)}
.ch-btn{font-family:var(--sf);font-size:15px;color:var(--blue);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.ch-btn:active{opacity:0.4}
.ch-title{font-family:var(--sf);font-size:15px;font-weight:600;color:var(--label)}
.text-area{padding:20px;max-width:680px;margin:0 auto;background:var(--bg);min-height:calc(100vh - 160px);touch-action:pan-y pinch-zoom}
.v{margin-bottom:4px;line-height:1.65;font-family:var(--serif);font-size:var(--fs);color:var(--label);transition:font-size 0.15s ease}
.vn{font-family:var(--sf);font-size:0.6em;font-weight:700;color:var(--blue);vertical-align:super;margin-right:3px}
.cr{font-family:var(--sf);font-size:0.55em;vertical-align:super;color:var(--orange);cursor:pointer;font-weight:600;text-decoration:none;margin-left:1px}
.cr:active{opacity:0.4}
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--tab-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid var(--sep);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,var(--safe-b));z-index:1000}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--g1);font-size:10px;font-weight:500;cursor:pointer;padding:2px 16px}
.tab.on{color:var(--blue)}
.tab i{font-size:22px;margin-bottom:1px}
.tab:active{opacity:0.4}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:2000;display:none;align-items:flex-end;justify-content:center;overflow:hidden}
.overlay.on{display:flex}
.sheet{background:var(--elevated);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;padding:0;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--g3) transparent}
.sheet::-webkit-scrollbar{width:4px}
.sheet::-webkit-scrollbar-track{background:transparent}
.sheet::-webkit-scrollbar-thumb{background:var(--g3);border-radius:4px}
.overlay.on .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:5px;background:var(--fill);border-radius:3px;margin:8px auto 0}
.sh-head{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--elevated);z-index:1}
.sh-title{font-size:17px;font-weight:600;color:var(--label)}
.sh-done{font-size:17px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer}
.sh-body{padding:0 20px 34px}
.t-label{font-size:13px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:0.06em;padding:20px 0 8px}
.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.b-item{padding:10px 8px;background:var(--fill3);border:none;border-radius:var(--r-md);cursor:pointer;font-size:13px;font-weight:500;text-align:center;color:var(--label);font-family:var(--sf);transition:all 0.15s}
.b-item:active,.b-item.on{background:var(--blue);color:#fff;transform:scale(0.96)}
.bk-list-item{padding:14px 0;border-bottom:0.5px solid var(--sep);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:500;color:var(--label);font-family:var(--sf);transition:opacity 0.15s}
.bk-list-item:active{opacity:0.4}
.bk-list-item.on{color:var(--blue)}
.bk-list-item.on::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;font-size:14px;color:var(--blue)}
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px;padding:0 20px 34px}
.c-item{padding:12px 8px;background:var(--fill3);border:none;border-radius:var(--r-md);cursor:pointer;font-size:15px;font-weight:500;text-align:center;color:var(--label);font-family:var(--sf);transition:all 0.15s}
.c-item:active,.c-item.on{background:var(--blue);color:#fff;transform:scale(0.94)}
.v-list{display:flex;flex-direction:column}
.v-item{padding:14px 0;border-bottom:0.5px solid var(--sep);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.v-item:last-child{border-bottom:none}
.v-item:active{opacity:0.4}
.v-item .va{font-size:17px;font-weight:600;color:var(--label)}
.v-item .vn2{font-size:15px;color:var(--label3)}
.v-item .vc{color:var(--blue);font-size:17px;display:none}
.v-item.on .vc{display:block}
.srch{padding:12px 16px;max-width:600px;margin:0 auto}
.srch-wrap{position:relative;margin-bottom:16px}
.srch-input{width:100%;padding:10px 12px 10px 36px;background:var(--fill3);border:none;border-radius:10px;font-size:17px;font-family:var(--sf);color:var(--label);outline:none}
.srch-input::placeholder{color:var(--label3)}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--g1);font-size:14px}
.sr-item{padding:14px 0;border-bottom:0.5px solid var(--sep);cursor:pointer}
.sr-item:active{opacity:0.4}
.sr-ref{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:3px}
.sr-txt{font-size:15px;line-height:1.4;color:var(--label)}
.sr-txt mark{background:rgba(0,122,255,0.12);color:var(--blue);border-radius:2px;padding:0 2px}
.cmt{padding:16px;max-width:600px;margin:0 auto}
.cmt-h{font-size:22px;font-weight:700;margin-bottom:16px}
.cmt-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;margin-bottom:20px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cmt-scroll::-webkit-scrollbar{display:none}
.cmt-card{flex-shrink:0;width:120px;padding:16px 12px;background:var(--card);border:1.5px solid var(--sep2);border-radius:var(--r-lg);cursor:pointer;text-align:center;transition:all 0.2s}
.cmt-card:active{transform:scale(0.96)}
.cmt-card.on{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(0,122,255,0.25)}
.cmt-av{width:48px;height:48px;border-radius:50%;background:var(--g5);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:18px;font-weight:700;color:var(--label2)}
.cmt-card.on .cmt-av{background:rgba(255,255,255,0.2);color:#fff}
.cmt-nm{font-size:12px;font-weight:600}
.cmt-yr{font-size:11px;opacity:0.5;margin-top:2px}
.cmt-body{background:var(--card);border-radius:var(--r-lg);padding:20px;border:0.5px solid var(--sep)}
.cmt-bh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cmt-bt{font-size:15px;font-weight:600}
.listen{background:var(--blue);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--sf)}
.listen:active{transform:scale(0.95)}
.cmt-txt{font-family:var(--serif);font-size:16px;line-height:1.6;color:var(--label2)}
.player{position:fixed;bottom:calc(50px + var(--safe-b));left:8px;right:8px;background:var(--elevated);border-radius:var(--r-lg);padding:12px 16px;display:none;align-items:center;gap:12px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.08);border:0.5px solid var(--sep)}
.player.on{display:flex}
.pl-btn{background:var(--blue);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0}
.pl-btn:active{transform:scale(0.9)}
.pl-info{flex:1;min-width:0}
.pl-t{font-size:14px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-s{font-size:12px;color:var(--label3);margin-top:1px}
.pl-bar{width:100%;height:3px;background:var(--fill);border-radius:2px;margin-top:6px;overflow:hidden}
.pl-fill{height:100%;background:var(--blue);border-radius:2px;width:0%;transition:width 0.5s linear}
.pl-x{background:none;border:none;color:var(--g1);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}
.pl-x:active{opacity:0.4}
.tip{position:fixed;background:var(--elevated);padding:14px 16px;border-radius:var(--r-lg);font-size:14px;max-width:320px;z-index:3000;display:none;box-shadow:0 12px 40px rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.1);border:0.5px solid var(--sep);line-height:1.45;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tip.on{display:block}
.tip-ref{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px}
.tip-txt{color:var(--label2);font-family:var(--serif)}
.swp{position:fixed;top:50%;transform:translateY(-50%);background:var(--fill);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--label);padding:10px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;z-index:1500;display:none;pointer-events:none}
.swp.l{left:16px}.swp.r{right:16px}
.fsi{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--fill);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);color:var(--label);padding:14px 22px;border-radius:var(--r-lg);font-size:15px;font-weight:600;z-index:3000;display:none;pointer-events:none}
.sec{display:none}.sec.on{display:block}
.verse-drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:2500;display:none;align-items:flex-end;justify-content:center;overflow:hidden}
.verse-drawer-overlay.on{display:flex}
.verse-drawer{background:var(--elevated);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:540px;padding:0 0 20px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:75vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.verse-drawer-overlay.on .verse-drawer{transform:translateY(0)}
.vd-handle{width:36px;height:5px;background:var(--fill);border-radius:3px;margin:8px auto 0}
.vd-header{padding:16px 20px 14px}
.vd-verse-label{font-size:14px;font-weight:600;color:var(--blue)}
.vd-verse-text{font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--label);margin-top:8px}
.vd-section{padding:20px 20px 8px}
.vd-section-title{font-size:12px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.vd-colors{display:flex;gap:14px;align-items:center}
.vd-color{width:38px;height:38px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.vd-color:active{transform:scale(0.9)}
.vd-color.selected{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue)}
.vd-color-clear{width:38px;height:38px;border-radius:50%;cursor:pointer;border:1.5px solid var(--sep2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--g1)}
.vd-color-clear{width:32px;height:32px;border-radius:50%;cursor:pointer;border:1.5px solid var(--sep2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--g1)}
.vd-actions{display:flex;flex-direction:column;gap:0}
.vd-action{padding:14px 0;border-bottom:0.5px solid var(--sep);display:flex;align-items:center;gap:12px;cursor:pointer;font-size:15px;font-weight:500;color:var(--label)}
.vd-action:last-child{border-bottom:none}
.vd-action:active{opacity:0.4}
.vd-action i{width:24px;text-align:center;font-size:16px;color:var(--blue)}
.vd-refs{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.vd-ref-item{padding:14px 16px;background:var(--fill3);border-radius:var(--r-lg);cursor:pointer}
.vd-ref-item:active{opacity:0.5}
.vd-ref-label{font-size:13px;font-weight:700;color:var(--orange)}
.vd-ref-text{font-size:15px;color:var(--label);margin-top:4px;font-family:var(--serif);line-height:1.5}
@media(min-width:768px){.b-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.text-area{padding:32px 40px}.cmt-scroll{flex-wrap:wrap}.cmt-card{width:140px}}
@media(min-width:1024px){.sheet{max-width:480px;border-radius:var(--r-xl);margin-bottom:40px}.overlay{align-items:center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner" id="navMain">
<div class="nav-left">
<button class="nav-btn" onclick="goHome()" title="Back to reading" id="homeBtn" style="display:none;margin-right:4px"><i class="fas fa-arrow-left"></i></button>
<button class="nav-book" onclick="openBooks()"><span id="hBook">Genesis 1</span> <i class="fas fa-chevron-down"></i></button>
<button class="nav-ver" onclick="openVers()" id="hVer">KJV</button>
</div>
<div class="nav-right">
<button class="nav-btn" onclick="openInlineSearch()"><i class="fas fa-search"></i></button>
</div>
</div>
<div class="nav-inner" id="navSearch" style="display:none;height:44px;padding:0 12px;gap:8px">
<input type="search" id="inlineSearchInput" class="srch-input" placeholder="Search the Bible..." oninput="doInlineSearch(this.value)" style="flex:1;padding:8px 12px;font-size:15px;border-radius:10px">
<button onclick="startVoiceSearch()" id="voiceMicBtn" style="background:none;border:none;color:var(--blue);font-size:18px;cursor:pointer;padding:4px 6px"><i class="fas fa-microphone"></i></button>
<button onclick="closeInlineSearch()" style="background:none;border:none;color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;font-family:var(--sf);white-space:nowrap">Cancel</button>
</div>
</nav>

<div id="inlineSearchResults" style="display:none;position:fixed;top:calc(44px + var(--safe-t));left:0;right:0;background:var(--bg);z-index:900;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;max-height:50vh;border-bottom:0.5px solid var(--sep);box-shadow:0 4px 16px rgba(0,0,0,0.1)"></div>

<main class="main">
<section class="sec on" id="secRead">
<div class="ch-nav">
<button class="ch-btn" onclick="prev()"><i class="fas fa-chevron-left"></i> Previous</button>
<span class="ch-title" id="chTitle">Genesis 1</span>
<button class="ch-btn" onclick="next()">Next <i class="fas fa-chevron-right"></i></button>
</div>
<div class="text-area" id="textArea"></div>
</section>
<section class="sec" id="secSearch">
<div class="srch">
<div class="srch-wrap"><i class="fas fa-search srch-ico"></i><input type="search" class="srch-input" id="sInput" placeholder="Search" oninput="doSearch(this.value)" style="padding-right:40px"><button onclick="startVoiceSearchTab()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--blue);font-size:18px;cursor:pointer"><i class="fas fa-microphone"></i></button></div>
<div id="recentSearches"></div>
<div id="sResults"></div>
</div>
</section>
<section class="sec" id="secStudy">
<div class="cmt"><div class="cmt-h">Commentary</div><div class="cmt-scroll" id="cmtGrid"></div><div class="cmt-body" id="cmtBody"><p style="color:var(--label3);text-align:center;padding:24px 0;font-size:15px">Select a commentator to begin.</p></div></div>
</section>
</main>

<div class="player" id="player">
<button class="pl-btn" id="plBtn" onclick="playPause()"><i class="fas fa-play"></i></button>
<div class="pl-info"><div class="pl-t" id="plT">Genesis 1</div><div class="pl-s" id="plS">King James Version</div><div class="pl-bar"><div class="pl-fill" id="plFill"></div></div></div>
<button class="pl-x" onclick="stopAudio()"><i class="fas fa-xmark"></i></button>
</div>

<nav class="tabs">
<button class="tab on" onclick="switchTab('reading')"><i class="fas fa-book"></i><span>Read</span></button>
<button class="tab" onclick="switchTab('search')"><i class="fas fa-search"></i><span>Search</span></button>
<button class="tab" onclick="switchTab('study')"><i class="fas fa-quote-left"></i><span>Study</span></button>
<button class="tab" onclick="toggleAudio()"><i class="fas fa-headphones"></i><span>Listen</span></button>
</nav>

<div class="overlay" id="oBooks" onclick="closeO('oBooks')"><div class="sheet" onclick="event.stopPropagation()"><div class="sh-handle"></div><div class="sh-head"><span class="sh-title">Books</span><button class="sh-done" onclick="closeO('oBooks')">Done</button></div><div class="sh-body" id="booksBody"></div></div></div>
<div class="overlay" id="oCh" onclick="closeO('oCh')"><div class="sheet" onclick="event.stopPropagation()"><div class="sh-handle"></div><div class="sh-head"><span class="sh-title" id="chShTitle">Chapter</span><button class="sh-done" onclick="closeO('oCh')">Done</button></div><div class="c-grid" id="chGrid"></div></div></div>
<div class="overlay" id="oVer" onclick="closeO('oVer')"><div class="sheet" onclick="event.stopPropagation()"><div class="sh-handle"></div><div class="sh-head"><span class="sh-title">Translation</span><button class="sh-done" onclick="closeO('oVer')">Done</button></div><div class="sh-body"><div class="v-list" id="verList"></div></div></div></div>

<div class="overlay" id="oCmtReader" onclick="closeO('oCmtReader')">
<div class="sheet" onclick="event.stopPropagation()" style="max-height:90vh;display:flex;flex-direction:column">
<div class="sh-handle"></div>

// Dynamic cross-reference system - fetches refs for any verse on demand
const CROSS_REFS_CACHE={};

async function fetchCrossRefs(bk,chp,vrs){
const key=bk+'_'+chp+'_'+vrs;
if(CROSS_REFS_CACHE[key])return CROSS_REFS_CACHE[key];
try{
const url=`https://bible-api.com/${bk} ${chp}:${vrs}?translation=kjv`;
const res=await fetch(url);
const data=await res.json();
// Generate contextual cross-references based on key biblical themes
const refs=generateCrossRefs(bk,chp,vrs,data.text||'');
CROSS_REFS_CACHE[key]=refs;
return refs;
}catch(e){return [];}
}

// Cross-reference mapping: only provides reference addresses (no fabricated text)
// When displayed, actual verse text is fetched from the Bible API
function generateCrossRefs(bk,chp,vrs,text){
const refs=[];
const t=text.toLowerCase();
// Only return reference addresses — text will be fetched live from API
if(t.includes('created')||t.includes('creation')){refs.push({rf:"John 1:3"});refs.push({rf:"Colossians 1:16"});}
if(t.includes('light')&&(t.includes('darkness')||t.includes('shine'))){refs.push({rf:"2 Corinthians 4:6"});refs.push({rf:"1 John 1:5"});}
if(t.includes('love')||t.includes('loved')){refs.push({rf:"1 John 4:8"});refs.push({rf:"John 3:16"});}
if(t.includes('faith')||t.includes('believe')){refs.push({rf:"Hebrews 11:1"});refs.push({rf:"Romans 10:17"});}
if(t.includes('sin')||t.includes('transgress')){refs.push({rf:"Romans 3:23"});refs.push({rf:"1 John 1:9"});}
if(t.includes('save')||t.includes('salvation')){refs.push({rf:"Ephesians 2:8"});refs.push({rf:"Acts 4:12"});}
if(t.includes('pray')||t.includes('prayer')){refs.push({rf:"Philippians 4:6"});refs.push({rf:"1 Thessalonians 5:17"});}
if(t.includes('word of god')||t.includes('commandment')){refs.push({rf:"Psalm 119:105"});refs.push({rf:"2 Timothy 3:16"});}
if(t.includes('shepherd')||t.includes('sheep')){refs.push({rf:"John 10:11"});refs.push({rf:"Psalm 23:1"});}
if(t.includes('fear not')||t.includes('be not afraid')){refs.push({rf:"Isaiah 41:10"});refs.push({rf:"Joshua 1:9"});}
if(t.includes('spirit')||t.includes('holy ghost')){refs.push({rf:"Acts 1:8"});refs.push({rf:"Galatians 5:22"});}
if(t.includes('heaven')||t.includes('eternal life')){refs.push({rf:"John 14:2"});refs.push({rf:"Revelation 21:4"});}
if(t.includes('grace')||t.includes('mercy')){refs.push({rf:"Ephesians 2:8"});refs.push({rf:"Lamentations 3:22-23"});}
if(t.includes('righteous')||t.includes('justice')){refs.push({rf:"Romans 3:22"});refs.push({rf:"Micah 6:8"});}
if(t.includes('bless')||t.includes('blessed')){refs.push({rf:"Numbers 6:24-26"});refs.push({rf:"Psalm 1:1"});}
if(t.includes('wisdom')||t.includes('knowledge')){refs.push({rf:"Proverbs 9:10"});refs.push({rf:"James 1:5"});}
if(t.includes('strength')||t.includes('power')){refs.push({rf:"Philippians 4:13"});refs.push({rf:"Isaiah 40:31"});}
if(t.includes('peace')){refs.push({rf:"John 14:27"});refs.push({rf:"Philippians 4:7"});}
if(t.includes('blood')||t.includes('sacrifice')){refs.push({rf:"Hebrews 9:22"});refs.push({rf:"1 Peter 1:19"});}
if(t.includes('covenant')||t.includes('promise')){refs.push({rf:"Hebrews 8:6"});refs.push({rf:"2 Peter 1:4"});}
if(!refs.length){refs.push({rf:"Romans 8:28"});refs.push({rf:"Jeremiah 29:11"});}
return refs.slice(0,4);
}

// Fetch actual verse text from API for a reference
async function fetchRefText(ref){
try{
const url=`https://bible-api.com/${encodeURIComponent(ref)}?translation=kjv`;
const res=await fetch(url);
const data=await res.json();
return data.text?data.text.trim():'';
}catch(e){return '';}
}

async function showRefs(event,vNum){
event.preventDefault();event.stopPropagation();
const tip=document.getElementById('tip');
tip.innerHTML='<div style="color:var(--label3);font-size:13px;padding:4px">Loading refs...</div>';
tip.style.display='block';
const rect=event.target.getBoundingClientRect();
let l=rect.left-40,t=rect.bottom+10;
if(l+300>window.innerWidth)l=window.innerWidth-310;
if(l<12)l=12;
if(t+200>window.innerHeight)t=rect.top-200;
if(t<10)t=10;
tip.style.left=l+'px';tip.style.top=t+'px';
const verseData=currentVerses.find(x=>x.v===vNum);
const refs=generateCrossRefs(book,ch,vNum,verseData?verseData.t:'');
// Fetch actual text for each reference from the API
const refsWithText=await Promise.all(refs.map(async r=>{
const tx=await fetchRefText(r.rf);
return {rf:r.rf,tx:tx||'(Tap to read full chapter)'};
}));
let html='<div class="tip-ref" style="margin-bottom:8px;font-size:13px;font-weight:700;color:var(--blue)">' +book+' '+ch+':'+vNum+' \u2014 Cross References</div>';
refsWithText.forEach(r=>{
html+=`<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:0.5px solid var(--sep)"><a onclick="goToRef('${r.rf.replace(/'/g,"\\'")}')" style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:2px;display:block;cursor:pointer;text-decoration:underline">${r.rf}</a><div class="tip-txt" style="font-size:13px">${r.tx}</div></div>`;
});
tip.innerHTML=html;
setTimeout(()=>{tip.style.display='none';},8000);
}
function goToRef(ref){
// Parse reference like "John 1:1-2", "1 Corinthians 11:8", "Genesis 3:22"
document.getElementById('tip').style.display='none';
closeVerseDrawer();
// Match patterns: "Book Chapter:Verse" or "1 Book Chapter:Verse"
const match=ref.match(/^(.+?)\s+(\d+)(?::(\d+))?/);
if(!match)return;
const refBook=match[1].trim();
const refCh=parseInt(match[2]);
const refVerse=match[3]?parseInt(match[3]):null;
// Find the book in OT or NT
const allBooks=[...OT,...NT];
const found=allBooks.find(b=>b.n===refBook);
if(!found)return;
// Save current position as home before navigating
homeBook=book;
homeCh=ch;
document.getElementById('homeBtn').style.display='flex';
book=refBook;
ch=refCh;
fetchChapter().then(()=>{
switchTab('reading');
window.scrollTo({top:0,behavior:'smooth'});
if(refVerse){
setTimeout(()=>{
const vs=document.querySelectorAll('.v');
if(vs[refVerse-1]){
vs[refVerse-1].scrollIntoView({behavior:'smooth',block:'center'});
vs[refVerse-1].style.background='rgba(0,122,255,0.08)';
vs[refVerse-1].style.borderRadius='8px';
vs[refVerse-1].style.padding='4px 8px';
setTimeout(()=>{vs[refVerse-1].style.background='';vs[refVerse-1].style.borderRadius='';vs[refVerse-1].style.padding='';},3000);
}
},300);
}
});
}

function goHome(){
book=homeBook;
ch=homeCh;
document.getElementById('homeBtn').style.display='none';
fetchChapter().then(()=>{
switchTab('reading');
window.scrollTo({top:0,behavior:'smooth'});
});
}

function doInlineSearch(q){
const res=document.getElementById('inlineSearchResults');
if(q.length<2){res.style.display='none';return;}
res.style.display='block';
let h='';
// Check if query matches a book name or reference like "John 3" or "John 3:16"
const allBooks=[...OT,...NT];
const refMatch=q.match(/^(.+?)\s+(\d+)(?::(\d+))?$/);
const bookMatches=allBooks.filter(b=>b.n.toLowerCase().startsWith(q.toLowerCase()));
if(bookMatches.length>0&&!refMatch){
h+='<div style="font-size:12px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:0.04em;padding:8px 0">Books</div>';
bookMatches.slice(0,5).forEach(b=>{
h+=`<div class="sr-item" onclick="showInlineChapters('${b.n}',${b.c})"><div class="sr-ref">${b.n}</div><div class="sr-txt">${b.c} chapters</div></div>`;
});
}
if(refMatch){
const refBook=refMatch[1].trim();
const refCh=parseInt(refMatch[2]);
const refV=refMatch[3]?parseInt(refMatch[3]):null;
const found=allBooks.find(b=>b.n.toLowerCase()===refBook.toLowerCase()||b.n.toLowerCase().startsWith(refBook.toLowerCase()));
if(found){
const goStr=refV?`closeInlineSearch();book='${found.n}';ch=${refCh};fetchChapter();switchTab('reading');setTimeout(()=>goV(${refV}),500)`:`closeInlineSearch();book='${found.n}';ch=${refCh};fetchChapter();switchTab('reading')`;
h+=`<div class="sr-item" onclick="${goStr}"><div class="sr-ref">${found.n} ${refCh}${refV?':'+refV:''}</div><div class="sr-txt">Go to ${found.n} chapter ${refCh}${refV?' verse '+refV:''}</div></div>`;
}
}
// Also search current chapter text
const lq=q.toLowerCase();
const m=currentVerses.filter(x=>x.t.toLowerCase().includes(lq));
if(m.length){
h+='<div style="font-size:12px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:0.04em;padding:8px 0">In Current Chapter</div>';
m.forEach(x=>{
const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
const hl=x.t.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');
h+=`<div class="sr-item" onclick="closeInlineSearch();goV(${x.v})"><div class="sr-ref">${book} ${ch}:${x.v}</div><div class="sr-txt">${hl}</div></div>`;
});}
if(!h){h=`<p style="text-align:center;color:var(--label3);padding:20px 0;font-size:15px">No results for \u201C${q}\u201D</p>`;}
res.innerHTML=h;
}

function doSearch(q){

if(q.length<2){res.innerHTML='';return;}
const lq=q.toLowerCase();
const m=currentVerses.filter(x=>x.t.toLowerCase().includes(lq));
let h='';
if(!m.length){h=`<p style="text-align:center;color:var(--label3);padding:32px 0;font-size:15px">No results for \u201C${q}\u201D</p>`;}
else{m.forEach(x=>{
const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
const hl=x.t.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');

async function openRefReader(ref, text){
closeVerseDrawer();
document.getElementById('tip').style.display='none';
const match=ref.match(/^(.+?)\s+(\d+)(?::(\d+))?/);
if(!match)return;
const refBook=match[1].trim();
const refCh=parseInt(match[2]);
const refVerse=match[3]?parseInt(match[3]):null;
document.getElementById('cmtReaderTitle').textContent=refBook+' '+refCh;
document.getElementById('cmtReaderBody').innerHTML=`<p style="text-align:center;padding:30px;color:var(--label3)">Loading...</p>`;
openO('oCmtReader');
let verses=[];
try{
const url=`https://bible-api.com/${refBook} ${refCh}?translation=${API_VER[ver]||'kjv'}`;
const res=await fetch(url);
const data=await res.json();
if(data.verses&&data.verses.length){verses=data.verses.map(v=>({v:v.verse,t:v.text.trim()}));}
else if(data.text){verses=[{v:1,t:data.text}];}
}catch(e){verses=[{v:1,t:'Unable to load chapter.'}];}
let html=`<div style="font-size:13px;color:var(--label3);margin-bottom:16px">Referenced from ${book} ${ch}</div>`;
verses.forEach(v=>{
const isHL=(refVerse&&v.v===refVerse);
const bg=isHL?'background:rgba(0,122,255,0.08);border-radius:6px;padding:4px 8px;margin:0 -8px 6px;':'';
html+=`<p style="font-family:var(--serif);font-size:17px;line-height:1.7;margin-bottom:6px;${bg}"><span style="font-size:0.6em;font-weight:700;color:var(--blue);vertical-align:super;margin-right:3px">${v.v}</span>${v.t}</p>`;
});
document.getElementById('cmtReaderBody').innerHTML=html;
const fullText=verses.map(v=>v.t).join(' ');
const footer=document.getElementById('cmtReaderFooter');
footer.innerHTML=`<div id="cmtPlayerArea"><button class="listen" onclick="startRefChapterPlayer()" style="width:100%;justify-content:center;padding:12px"><i class="fas fa-headphones"></i> Listen to Chapter</button></div><button onclick="closeO('oCmtReader');goToRef('${ref.replace(/'/g,"\\'")}')" style="width:100%;margin-top:10px;padding:12px;background:none;border:1.5px solid var(--blue);border-radius:20px;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sf);display:flex;align-items:center;justify-content:center;gap:6px"><i class="fas fa-arrow-right"></i> Read in full view</button>`;
window._refChapterText=fullText;
}

<span id="cmtTimer" style="color:#fff;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;min-width:44px;text-align:center">00:00</span>
<button onclick="cmtPlayPause()" id="cmtPPBtn" style="background:rgba(255,255,255,0.25);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-pause"></i></button>
<button onclick="cmtCycleRate()" id="cmtRateBtn" style="background:rgba(255,255,255,0.25);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">${cmtRate}x</button>
</div>
<button onclick="cmtForward()" style="background:none;border:none;color:#fff;cursor:pointer;padding:6px;opacity:0.9;position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center"><i class="fas fa-rotate-right" style="font-size:20px"></i><span style="position:absolute;font-size:8px;font-weight:800;top:50%;left:50%;transform:translate(-50%,-50%);margin-top:1px">30</span></button>
</div>
`;
}

let cmtTimerInterval=null,cmtElapsed=0;
function startCmtTimer(){
cmtElapsed=0;
clearInterval(cmtTimerInterval);
cmtTimerInterval=setInterval(()=>{
if(!cmtPlaying)return;
cmtElapsed++;
const m=String(Math.floor(cmtElapsed/60)).padStart(2,'0');
const s=String(cmtElapsed%60).padStart(2,'0');
const el=document.getElementById('cmtTimer');
if(el)el.textContent=m+':'+s;
},1000);
}
function stopCmtTimer(){clearInterval(cmtTimerInterval);}

function speakFromCurrentIdx(){
if(!('speechSynthesis' in window))return;
speechSynthesis.cancel();
if(cmtSentenceIdx>=cmtSentences.length){cmtPlaying=false;showCmtPaused();return;}
const remaining=cmtSentences.slice(cmtSentenceIdx).join(' ');
cmtUtterance=new SpeechSynthesisUtterance(remaining);
cmtUtterance.rate=cmtRate*0.92;
cmtUtterance.pitch=1.05;
const voices=speechSynthesis.getVoices();
const siriVoice=voices.find(v=>v.name.includes('Samantha'))||voices.find(v=>v.name.includes('Karen'))||voices.find(v=>v.name.includes('Daniel'))||voices.find(v=>v.lang.startsWith('en')&&v.localService);
if(siriVoice)cmtUtterance.voice=siriVoice;
// Track sentence progress via boundary events
cmtUtterance.onboundary=function(e){
if(e.name==='sentence'){cmtSentenceIdx++;}
};
cmtUtterance.onend=()=>{cmtPlaying=false;cmtSentenceIdx=cmtSentences.length;showCmtPaused();};
speechSynthesis.speak(cmtUtterance);
cmtPlaying=true;
}

function showCmtPaused(){
const area=document.getElementById('cmtPlayerArea');
if(!area)return;
area.innerHTML=`
<div style="display:flex;align-items:center;background:var(--blue);border-radius:20px;padding:10px 16px;width:100%;justify-content:center;position:relative">
<button onclick="cmtResume()" id="cmtPPBtn" style="background:rgba(255,255,255,0.25);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-play"></i></button>
<button onclick="cmtStop()" style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer;padding:6px;opacity:0.9;position:absolute;right:16px"><i class="fas fa-xmark"></i></button>
</div>
`;
}

function cmtPlayPause(){
if(!('speechSynthesis' in window))return;
if(cmtPlaying){
speechSynthesis.pause();
cmtPlaying=false;
showCmtPaused();
}
}

function cmtResume(){
if(!('speechSynthesis' in window))return;
// Try resume first, fall back to restarting from current sentence
if(speechSynthesis.paused){
speechSynthesis.resume();
}else{
speakFromCurrentIdx();
}
cmtPlaying=true;
startCmtPlayerUI();
}

function startCmtPlayerUI(){
const area=document.getElementById('cmtPlayerArea');
if(!area)return;
area.innerHTML=buildPlayerHTML();
// Restore timer display
const el=document.getElementById('cmtTimer');
if(el){
const m=String(Math.floor(cmtElapsed/60)).padStart(2,'0');
const s=String(cmtElapsed%60).padStart(2,'0');
el.textContent=m+':'+s;
}
}

function cmtRewind(){
if(!('speechSynthesis' in window)||!cmtSentences.length)return;
// Jump back ~3 sentences (approx 30s)
cmtSentenceIdx=Math.max(0,cmtSentenceIdx-3);
speakFromCurrentIdx();
cmtPlaying=true;
startCmtPlayerUI();
}

function cmtForward(){
if(!('speechSynthesis' in window)||!cmtSentences.length)return;
// Jump forward ~3 sentences (approx 30s)
cmtSentenceIdx=Math.min(cmtSentences.length-1,cmtSentenceIdx+3);
speakFromCurrentIdx();
cmtPlaying=true;
startCmtPlayerUI();
}

const RATES=[0.75,1,1.25,1.5,2];
let cmtCurrentId=null;
function cmtCycleRate(){
let idx=RATES.indexOf(cmtRate);
idx=(idx+1)%RATES.length;
cmtRate=RATES[idx];
const rBtn=document.getElementById('cmtRateBtn');
if(rBtn)rBtn.textContent=cmtRate+'x';
// Restart from current sentence position with new rate
if('speechSynthesis' in window&&cmtPlaying){
speakFromCurrentIdx();
}
}

function cmtStop(){
if('speechSynthesis' in window)speechSynthesis.cancel();
cmtPlaying=false;
stopCmtTimer();
const area=document.getElementById('cmtPlayerArea');
if(area)area.innerHTML=`<button class="listen" onclick="startCmtPlayer('${cmtCurrentId||activeCmt||'spurgeon'}')" style="width:100%;justify-content:center;padding:12px"><i class="fas fa-headphones"></i> Listen</button>`;
}
function listenCmt(id){
const d=CMTD[id];
if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(d.text);u.rate=0.9;speechSynthesis.speak(u);}
const p=document.getElementById('player');p.classList.add('on');
document.getElementById('plT').textContent=d.title;
document.getElementById('plS').textContent=CMTS.find(c=>c.id===id).nm;
playing=true;document.getElementById('plBtn').innerHTML='<i class="fas fa-pause"></i>';
}

function toggleAudio(){
const p=document.getElementById('player');
if(!p.classList.contains('on')){p.classList.add('on');updH();startRead();}
else{playPause();}
}
// Natural speech preparation - adds pauses and pacing for more human-like delivery
function prepareForSpeech(text){
let t=text;
// Add longer pauses after periods (sentence breaks)
t=t.replace(/\. /g, '... ');
// Add medium pauses after colons and semicolons
t=t.replace(/: /g, ':... ');
t=t.replace(/; /g, ';.. ');
// Add slight pause after commas
t=t.replace(/, /g, ',. ');
// Add dramatic pause before "and" at start of sentences (biblical style)
t=t.replace(/\. And /g, '... ... And ');
// Add pause before quoted speech
t=t.replace(/said, /g, 'said,... ');
t=t.replace(/saying, /g, 'saying,... ');
// Add pause after "Behold"
t=t.replace(/Behold,/g, 'Behold,...');
// Add pause around "the LORD"
t=t.replace(/the LORD/g, '.. the LORD..');
// Slow down for emphasis on key phrases
t=t.replace(/God created/g, '.. God.. created..');
t=t.replace(/it was good/g, '.. it was good..');
t=t.replace(/it was very good/g, '... it was... very good...');
return t;
}

function startRead(){
if('speechSynthesis' in window){
speechSynthesis.cancel();
const txt=currentVerses.map(x=>x.t).join(' ');
const processed=prepareForSpeech(txt);
const u=new SpeechSynthesisUtterance(processed);
u.rate=0.82;
u.pitch=1.05;
const voices=speechSynthesis.getVoices();
const siriVoice=voices.find(v=>v.name.includes('Samantha'))||voices.find(v=>v.name.includes('Karen'))||voices.find(v=>v.name.includes('Daniel'))||voices.find(v=>v.lang.startsWith('en')&&v.localService);
if(siriVoice)u.voice=siriVoice;
u.onend=()=>{playing=false;document.getElementById('plBtn').innerHTML='<i class="fas fa-play"></i>';};
speechSynthesis.speak(u);playing=true;
document.getElementById('plBtn').innerHTML='<i class="fas fa-pause"></i>';
simProg();
}}
function playPause(){
if('speechSynthesis' in window){
if(playing){speechSynthesis.pause();playing=false;document.getElementById('plBtn').innerHTML='<i class="fas fa-play"></i>';}
else{speechSynthesis.resume();playing=true;document.getElementById('plBtn').innerHTML='<i class="fas fa-pause"></i>';}
}}
function stopAudio(){
if('speechSynthesis' in window)speechSynthesis.cancel();
document.getElementById('player').classList.remove('on');playing=false;
document.getElementById('plBtn').innerHTML='<i class="fas fa-play"></i>';
}
function simProg(){let p=0;const iv=setInterval(()=>{if(!playing){clearInterval(iv);return;}p+=0.3;if(p>=100){clearInterval(iv);return;}document.getElementById('plFill').style.width=p+'%';},500);}

function setupTouch(){
const c=document.getElementById('textArea');
c.addEventListener('touchstart',e=>{
if(e.touches.length===1){tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;}
if(e.touches.length===2){pd0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
c.addEventListener('touchend',e=>{
if(e.changedTouches.length===1){
const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){
if(dx>0){document.getElementById('swpL').style.display='block';setTimeout(()=>document.getElementById('swpL').style.display='none',600);prev();}
else{document.getElementById('swpR').style.display='block';setTimeout(()=>document.getElementById('swpR').style.display='none',600);next();}
}}},{passive:true});
c.addEventListener('touchmove',e=>{
if(e.touches.length===2){
const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
const s=d/pd0;
if(s>1.08){fs=Math.min(30,fs+1);pd0=d;updFS();}
else if(s<0.92){fs=Math.max(13,fs-1);pd0=d;updFS();}
}},{passive:true});
}
function updFS(){
document.querySelectorAll('.v').forEach(v=>{v.style.fontSize=fs+'px';});
const i=document.getElementById('fsi');i.textContent=fs+'px';i.style.display='block';
clearTimeout(window._ft);window._ft=setTimeout(()=>{i.style.display='none';},800);
}

// Pull-to-dismiss for sheets
(function(){
let startY=0,currentY=0,isDragging=false;
document.querySelectorAll('.sheet').forEach(sheet=>{
sheet.addEventListener('touchstart',e=>{
if(sheet.scrollTop<=0){startY=e.touches[0].clientY;isDragging=true;}
else{isDragging=false;}
},{passive:true});
sheet.addEventListener('touchmove',e=>{
if(!isDragging)return;
currentY=e.touches[0].clientY;
const diff=currentY-startY;
if(diff>0&&sheet.scrollTop<=0){
sheet.style.transform=`translateY(${diff}px)`;
sheet.style.transition='none';
}
},{passive:true});
sheet.addEventListener('touchend',()=>{
if(!isDragging)return;
const diff=currentY-startY;
sheet.style.transition='transform 0.35s cubic-bezier(0.32,0.72,0,1)';
if(diff>80){
// Close the parent overlay
const overlay=sheet.closest('.overlay')||sheet.closest('.verse-drawer-overlay');
if(overlay){
if(overlay.id==='verseDrawer'){closeVerseDrawer();}
else{closeO(overlay.id);}
}
}
sheet.style.transform='';
isDragging=false;currentY=0;startY=0;
},{passive:true});
});
// Same for verse-drawer
const vd=document.querySelector('.verse-drawer');
if(vd){
let sy=0,cy=0,drag=false;
vd.addEventListener('touchstart',e=>{
if(vd.scrollTop<=0){sy=e.touches[0].clientY;drag=true;}else{drag=false;}
},{passive:true});
vd.addEventListener('touchmove',e=>{
if(!drag)return;
cy=e.touches[0].clientY;
const diff=cy-sy;
if(diff>0&&vd.scrollTop<=0){vd.style.transform=`translateY(${diff}px)`;vd.style.transition='none';}
},{passive:true});
vd.addEventListener('touchend',()=>{
if(!drag)return;
const diff=cy-sy;
vd.style.transition='transform 0.35s cubic-bezier(0.32,0.72,0,1)';
if(diff>80){closeVerseDrawer();}
vd.style.transform='';
drag=false;cy=0;sy=0;
},{passive:true});
}
})();
</script>
